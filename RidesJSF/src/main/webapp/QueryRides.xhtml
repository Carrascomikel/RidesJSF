<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui">

<f:view>

	<h:head>
		<title>Rides app</title>
		<h:outputStylesheet library="css" name="style.css" />
	</h:head>

	<h:body>
		
		<h:form>
			<f:event type="preRenderView" listener="#{QR.berrabiaratu}" />
			<h3>Query Rides</h3>

			<table>
				<tr>
					<td>Depart City:</td>
					<td><h:selectOneMenu id="departCity" value="#{QR.departCity}"
							required="true"
							requiredMessage="You must select a departure city ">
							<f:selectItem itemValue="" itemLabel="Select a Depart city"
								noSelectionOption="true" />
							<f:selectItems value="#{QR.departCitys}" />
							<p:ajax event="change" listener="#{QR.departCityChange}"
								update="arrivalCity" />
						</h:selectOneMenu></td>
					<td><h:message for="departCity" errorClass="error-msg" /></td>

				</tr>
				<tr>
					<td>Arrival City:</td>
					<td><h:selectOneMenu id="arrivalCity"
							value="#{QR.arrivalCity}" required="true"
							requiredMessage="You must select an arrival city">
							<f:selectItem itemValue="" itemLabel="Select an Arrival city"
								noSelectionOption="true" />
							<f:selectItems value="#{QR.arrivalCitys}" />

						</h:selectOneMenu></td>
					<td><h:message for="departCity" errorClass="error-msg" /></td>
				</tr>
				<tr>
					<td>Ride Date:</td>
					<td><p:calendar id="data" value="#{QR.date}" navigator="true"
							mode="inline">
						</p:calendar></td>
				</tr>
			</table>
			<h:commandButton value="Query Rides" action="#{QR.bidaiaBilatu}" />

		</h:form>

		<div class="form-card">
			<h:dataTable id="taula" value="#{QR.rides}" var="ride"
				styleClass="data-table" headerClass="data-table-header"
				rowClasses="data-row-odd,data-row-even">

				<f:facet name="header">
					<span class="table-title">Rides</span>
				</f:facet>

				<h:column>
					<f:facet name="header">Driver</f:facet>
            #{ride.driver.email}
        </h:column>
				<h:column>
					<f:facet name="header">Seats</f:facet>
            #{ride.nPlaces}
        </h:column>
				<h:column>
					<f:facet name="header">Price</f:facet>
            #{ride.price}
        </h:column>
			</h:dataTable>
		</div>

	</h:body>

</f:view>

</html>
