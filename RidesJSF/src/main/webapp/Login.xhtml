<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

    <f:view>

        <h:head>
            <title>Rides Aplikazioa</title>
        </h:head>

        <h:body>
            <h:form>

                <h3>Mesedez, sartu izena eta pasahitza</h3>

                <table>

                    <!-- Izena -->
                    <tr>
                        <td>Izena:</td>
                        <td>
                            <h:inputText id="izen" value="#{login.izena}" />
                        </td>
                    </tr>

                    <!-- Pasahitza -->
                    <tr>
                        <td>Pasahitza:</td>
                        <td>
                            <h:inputSecret id="pass" value="#{login.pasahitza}">
                                <f:validateLength minimum="8" maximum="16" />
                            </h:inputSecret>
                        </td>
                        <td>
                            <h:message for="pass" style="color:red" />
                        </td>
                    </tr>
                </table>

                <p>
                    <h:commandButton value="Onartu" action="#{login.egiaztatu}" />
                </p>
			<h:link value='Oraindik ez zara erregistratu?' outcome='register'></h:link>
            </h:form>
          
        </h:body>

    </f:view>

</html>
