<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core">

<f:view>

	<h:head>
		<title>Rides app</title>
		<h:outputStylesheet library="css" name="style.css" />
	</h:head>

	<h:body>
		<h:form>

			<h3>Please, insert your email and password</h3>

			<table>
				<tr>
					<td>Email:</td>
					<td><h:inputText id="email" value="#{login.email}" required="true" requiredMessage="You forgot the email" /></td>
					<td><h:message for="pass" errorClass="error-msg" /></td>
				</tr>
				<tr>
					<td>Password:</td>
					<td><h:inputSecret id="pass" value="#{login.pasahitza}" required="true" requiredMessage="You forgot the password" /></td>
					<td><h:message for="pass" errorClass="error-msg" /></td>
				</tr>
			</table>

			<p>
				<h:commandButton value="Login" action="#{login.egiaztatu}" />
			</p>
			<h:link value='Havent you registered yet?' styleClass="link" outcome='register'></h:link>
		
		<h:messages globalOnly="true" errorClass="error-msg"/>
		</h:form>

	</h:body>

</f:view>

</html>
