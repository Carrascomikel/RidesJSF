<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <f:view>

        <h:head>
            <title>Rides app</title>
            <h:outputStylesheet library="css" name="style.css" />
        </h:head>

        <h:body>
            <h:form>

                <h3>Register</h3>

                <table> 
                    <tr>
                        <td>Name:</td>
                        <td>
                            <h:inputText id="izen" value="#{register.izena}" required="true"
                            requiredMessage="Name is mandatory" />
                        </td>
                        <td>
                            <h:message for="izen" style="color:#cf6679" />
                        </td>
                    </tr>
                    <tr>
                        <td>Email:</td>
                        <td>
                            <h:inputText id="emaila" value="#{register.emaila}" required="true" pt:placeholder="example@gmail.com"
                            requiredMessage="Email is mandatory"
                            validatorMessage="Email is wrong. Follow the example">
                            	 <f:validateRegex pattern="^[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9.\-]+\.com$" />
                            </h:inputText> 
                            
                        </td>
                        <td>
                            <h:message for="emaila" style="color:#cf6679" />
                        </td>
                    </tr>
                    <tr>
                        <td>Password:</td>
                        <td>
                            <h:inputSecret id="pass" value="#{register.pasahitza}" required="true"
                            requiredMessage="Pasahitza derrigorrezkoa da"
                            validatorMessage="Pasahitzak 8 eta 16 karaktere artean egon behar du.">
                                <f:validateLength minimum="8" maximum="16"/>
                            </h:inputSecret>
                        </td>
                        <td>
                            <h:message for="pass" style="color:#cf6679" />
                        </td>
                    </tr>
                    <tr>
                        <td>Repeat password:</td>
                        <td>
                            <h:inputSecret id="pass2" value="#{register.pasahitzaBerretsi}" required="true"
                            requiredMessage="You must repeat the password">
                                <f:validateLength minimum="8" maximum="16" />
                            </h:inputSecret>
                        </td>
                        <td>
                            <h:message for="pass2" style="color: #cf6679" />
                        </td>
                    </tr>
                    <tr>
                        <td>Role:</td>
                        <td>
                            <h:selectOneRadio id="rola" value="#{register.rola}" required="true"
                            requiredMessage="You must choose a role">
                                <f:selectItem itemValue="Driver"   itemLabel="Driver"   />
                                <f:selectItem itemValue="Traveler" itemLabel="Traveler" />
                            </h:selectOneRadio>
                        </td>
                        <td>
                            <h:message for="rola" style="color:#cf6679" />
                        </td>
                    </tr>

                </table>

                <p>
                    <h:commandButton value="Register" action="#{register.erregistratu}" />
                </p>

            </h:form>
        </h:body>

    </f:view>

</html>
