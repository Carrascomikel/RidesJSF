<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

    <f:view>

        <h:head>
            <title>Rides Aplikazioa</title>
        </h:head>

        <h:body>
            <h:form>

                <h3>Erregistroa</h3>

                <table> 
                    <tr>
                        <td>Izena:</td>
                        <td>
                            <h:inputText id="izen" value="#{register.izena}" required="true"
                            requiredMessage="Izena beharrezkoa da" />
                        </td>
                        <td>
                            <h:message for="izen" style="color:red" />
                        </td>
                    </tr>
                    <tr>
                        <td>Emaila:</td>
                        <td>
                            <h:inputText id="emaila" value="#{register.emaila}" required="true" placeholder="example@gmail.com"
                            requiredMessage="Emaila beharrezkoa da"
                            validatorMessage="Emaila gaizki idatzita dago">
                            	 <f:validateRegex pattern="^[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9.\-]+\.com$" />
                            </h:inputText> 
                            
                        </td>
                        <td>
                            <h:message for="emaila" style="color:red" />
                        </td>
                    </tr>
                    <tr>
                        <td>Pasahitza:</td>
                        <td>
                            <h:inputSecret id="pass" value="#{register.pasahitza}" required="true"
                            requiredMessage="Pasahitza derrigorrezkoa da"
                            validatorMessage="Pasahitzak 8 eta 16 karaktere artean egon behar du.">
                                <f:validateLength minimum="8" maximum="16"/>
                            </h:inputSecret>
                        </td>
                        <td>
                            <h:message for="pass" style="color:red" />
                        </td>
                    </tr>
                    <tr>
                        <td>Pasahitza berretsi:</td>
                        <td>
                            <h:inputSecret id="pass2" value="#{register.pasahitzaBerretsi}" required="true"
                            requiredMessage="Pasahitza berrestea derrigorrezkoa da">
                                <f:validateLength minimum="8" maximum="16" />
                            </h:inputSecret>
                        </td>
                        <td>
                            <h:message for="pass2" style="color:red" />
                        </td>
                    </tr>
                    <tr>
                        <td>Rola:</td>
                        <td>
                            <h:selectOneRadio id="rola" value="#{register.rola}" required="true"
                            requiredMessage="Rola aukeratu behar da">
                                <f:selectItem itemValue="Driver"   itemLabel="Driver"   />
                                <f:selectItem itemValue="Traveler" itemLabel="Traveler" />
                            </h:selectOneRadio>
                        </td>
                        <td>
                            <h:message for="rola" style="color:red" />
                        </td>
                    </tr>

                </table>

                <p>
                    <h:commandButton value="Erregistratu" action="#{register.erregistratu}" />
                </p>

            </h:form>
        </h:body>

    </f:view>

</html>
