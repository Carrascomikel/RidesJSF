<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui">

<f:view>

	<h:head>
		<title>Rides app</title>
		<h:outputStylesheet library="css" name="style.css" />
	</h:head>

	<h:body>
		<h:form>

			<h3>Create Ride</h3>

			<table>
				<tr>
					<td>Depart City:</td>
					<td><h:inputText id="departCity" value="#{CR.departCity}" required="true">
					
					</h:inputText></td>
					<td><h:message for="departCity" errorClass="error-msg" /></td>

				</tr>
				<tr>
					<td>Arrival City:</td>
					<td><h:inputText id="arrivalCity" value="#{CR.arrivalCity}" required="true">
					
					</h:inputText></td>
					<td><h:message for="arrivalCity" errorClass="error-msg" /></td>
				</tr>
				<tr>
					<td>Number of Seats:</td>
					<td><h:inputText id="seats" value="#{CR.numberOfSeats}"
							required="true"
							validatorMessage="Inappropriate number of seats">
							<f:validateLongRange minimum="1" maximum="6" />
						</h:inputText></td>
					<td><h:message for="seats" errorClass="error-msg" /></td>
				</tr>
				<tr>
					<td>Price:</td>
					<td><h:inputText id="price" value="#{CR.price}"
							required="true" requiredMessage="You must enter the ride price"
							validatorMessage="Insert an appropiate price">
							<f:validateDoubleRange minimum="0" />
						</h:inputText></td>
					<td><h:message for="price" errorClass="error-msg" /></td>
				</tr>
				<tr>
					<td>Ride Date:</td>
					<td><p:calendar id="data" value="#{CR.date}" navigator="true"
							mode="inline">
						</p:calendar></td>
				</tr>
			</table>

			
				<h:commandButton value="Create Ride" action="#{CR.bidaiaSortu}" />
			
			<h:messages globalOnly="true" infoClass="success-msg"
				errorClass="error-msg"/>
		</h:form>
	</h:body>

</f:view>

</html>
