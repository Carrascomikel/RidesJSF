<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui">

<f:view>

	<h:head>
		<title>Rides Aplikazioa</title>
	</h:head>

	<h:body>
		<h:form>

			<h3>Create Ride</h3>

			<table>
				<tr>
					<td>Depart City:</td>
					<td><h:selectOneMenu id="departCity"
							value="#{CR.departCity}" required="true">
							<f:selectItem itemValue="" itemLabel="Select a Depart city"
								noSelectionOption="true" />
							<f:selectItems value="#{CR.departCitys}" />
							<p:ajax event="change" listener="#{CR.departCityChange}" update="arrivalCity"/>
						</h:selectOneMenu></td>
					<td><h:message for="departCity" style="color:red" /></td>

				</tr>
				<tr>
					<td>Arrival City:</td>
					<td><h:selectOneMenu id="arrivalCity"
							value="#{CR.arrivalCity}" required="true">
							<f:selectItem itemValue="" itemLabel="Select an Arrival city"
								noSelectionOption="true" />
							<f:selectItems value="#{CR.arrivalCitys}" />
							
						</h:selectOneMenu></td>
					<td><h:message for="departCity" style="color:red" /></td>
				</tr>
				<tr>
					<td>Number of Seats:</td>
					<td><h:inputText id="seats" value="#{CR.numberOfSeats}"
							required="true">
							<f:validateLongRange minimum="1" maximum="8" />
						</h:inputText></td>
					<td><h:message for="seats" style="color:red" /></td>
				</tr>
				<tr>
					<td>Price:</td>
					<td><h:inputText id="price" value="#{CR.price}"
							required="true">
							<f:validateDoubleRange minimum="0.0" />
						</h:inputText></td>
					<td><h:message for="price" style="color:red" /></td>
				</tr>
				<!-- Data jartzea falta da. -->
				<tr>
					<td>Ride Date:</td>
					<td><p:calendar id="data" value="#{CR.date}" navigator="true"
							mode="inline">
						</p:calendar></td>
				</tr>
			</table>

			<p>
				<h:commandButton value="Create Ride" action="#{CR.createRide}" />
			</p>

		</h:form>
	</h:body>

</f:view>

</html>
